name: "Android Resource Translator"
description: "Checks Android resource files for missing translations and automatically translates them using modern LLM providers."
author: "DuarteBarbosaDev"

branding:
  icon: 'book-open'
  color: 'green'

inputs:
  resources_paths:
    description: "Comma-separated paths to the Android resource directories (e.g., './app/src/main/res, ./library/src/main/res')."
    required: false
    default: "${{ github.workspace }}"
  dry_run:
    description: "Run in dry-run mode (only report missing translations without translating). Set to 'true' to enable dry-run mode."
    required: false
    default: "false"
  log_trace:
    description: "Enable detailed logging. Set to 'true' to enable."
    required: false
    default: "false"
  llm_provider:
    description: "LLM provider to use (e.g. openrouter, openai, gemini, anthropic, ollama, lm_studio)"
    required: false
    default: "openrouter"
  model:
    description: "Model to use for translation (e.g. 'google/gemini-2.5-flash', 'gpt-4o-mini', 'claude-3-5-sonnet-latest')"
    required: false
    default: "google/gemini-2.5-flash"
  openrouter_site_url:
    description: "Your site URL for OpenRouter rankings (This Github action is set by default - optional, only used with OpenRouter)"
    required: false
    default: "https://github.com/duartebarbosadev/AndroidResourceTranslator"
  openrouter_site_name:
    description: "Your site name for OpenRouter rankings (This Github action is set by default - optional, only used with OpenRouter)"
    required: false
    default: "AndroidResourceTranslatorAction"
  openrouter_send_site_info:
    description: "Send site URL and name to OpenRouter for rankings (This Github action is set by default - set to 'false' to disable)"
    required: false
    default: "true"
  project_context:
    description: "Additional project context to include in translation prompts."
    required: false
    default: ""
  ignore_folders:
    description: "Comma-separated list of folder names to ignore during resource scanning (e.g., build)."
    required: false
    default: ""
  include_reference_context:
    description: "Include existing translations from the target language as context for the LLM. Set to 'false' to disable."
    required: false
    default: "true"
  reference_context_limit:
    description: "Maximum number of existing translations to include as context (0 disables context)."
    required: false
    default: "25"
  batch_size:
    description: "Maximum number of items to translate in a single batch API call (default: 10)."
    required: false
    default: "10"

outputs:
  translation_report:
    description: "A translation report in markdown format"
    
runs:
  using: 'docker'
  image: 'Dockerfile'
